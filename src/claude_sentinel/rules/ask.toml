# Commands that prompt user confirmation without LLM evaluation.

# --- Remote / System Access ---

[[rules]]
name = "ssh"
command_regex = '''^\s*ssh\s+'''

[[rules]]
name = "systemctl"
command_regex = '''^\s*systemctl\s+'''

[[rules]]
name = "crontab-edit"
command_regex = '''^\s*crontab\s+(-e|-r)'''

# --- Deploy & Infrastructure Mutations ---

[[rules]]
name = "deploy"
command_regex = '''^\s*(?!(echo|cat|grep|rg|ag|find|head|tail|wc|sort|diff|git|ls|sed|awk|jq|python3?|node|file|strings)\s)(\S+\s+){0,2}deploy(\s|$)'''

[[rules]]
name = "terraform"
command_regex = '''^\s*terraform\s+(apply|destroy|import|state|taint|untaint|force-unlock)(\s|$)'''

[[rules]]
name = "pulumi"
command_regex = '''^\s*pulumi\s+(up|destroy|import|cancel|refresh)(\s|$)'''

[[rules]]
name = "kubectl-mutate"
command_regex = '''^\s*kubectl\s+(apply|delete|create|replace|patch|edit|rollout|scale|drain|cordon|uncordon|taint|untaint)(\s|$)'''

[[rules]]
name = "helm-mutate"
command_regex = '''^\s*helm\s+(install|upgrade|uninstall|rollback)(\s|$)'''

# --- Make External-Impact Targets ---

[[rules]]
name = "make-deploy"
command_regex = '''^\s*make\s+(deploy|tf[\w-]*|terraform-[\w-]*)(\s|$)'''

[[rules]]
name = "make-sync"
command_regex = '''^\s*make\s+sync[\w-]*(\s|$)'''

[[rules]]
name = "make-publish-release"
command_regex = '''^\s*make\s+(publish|release|push)[\w-]*(\s|$)'''

[[rules]]
name = "make-upgrade"
command_regex = '''^\s*make\s+upgrade[\w-]*(\s|$)'''

# --- Package Publishing ---

[[rules]]
name = "npm-publish"
command_regex = '''^\s*(npm|yarn|pnpm)\s+publish(\s|$)'''

[[rules]]
name = "gem-push"
command_regex = '''^\s*gem\s+push(\s|$)'''

[[rules]]
name = "twine-upload"
command_regex = '''^\s*twine\s+upload(\s|$)'''

# --- Package Execution (npx/pnpx/bunx) ---

[[rules]]
name = "npx-execute"
command_regex = '''^\s*(npx|pnpx|bunx)\s+(?!(prettier|eslint|tsc|biome|shadcn(@\S+)?|prisma|vitest|jest|mocha|playwright|cypress|tailwindcss|postcss|autoprefixer|next|vite|turbo|tsup|esbuild|rollup|webpack)(\s|$))'''

# --- Python Toolchain Mutations ---

[[rules]]
name = "uv-mutate"
command_regex = '''^\s*uv\s+(pip\s+install|pip\s+uninstall|add|remove|tool\s+install|tool\s+uninstall|self\s+update|publish)(\s|$)'''

# --- Rust Toolchain Mutations ---

[[rules]]
name = "rustup-mutate"
command_regex = '''^\s*rustup\s+(update|self|install|uninstall|default|override|component|target|toolchain|run)(\s|$)'''

[[rules]]
name = "cargo-mutate"
command_regex = '''^\s*cargo\s+(install|uninstall|add|remove|update|search|publish)(\s|$)'''

# --- Docker Mutations ---

[[rules]]
name = "docker-exec-run"
command_regex = '''^\s*docker\s+(exec|run|cp|login|logout|attach)(\s|$)'''

[[rules]]
name = "docker-push"
command_regex = '''^\s*docker\s+(push|buildx\s+.*--push)(\s|$)'''

[[rules]]
name = "docker-compose-exec-run"
command_regex = '''^\s*docker[\s-]+compose\s+(exec|run)(\s|$)'''

# --- Go Generate ---

[[rules]]
name = "go-generate"
command_regex = '''^\s*go\s+generate(\s|$)'''

# --- GitHub Mutations ---

[[rules]]
name = "gh-mutate"
command_regex = '''^\s*gh\s+(pr|issue)\s+(create|close|merge|reopen|edit|comment|review)(\s|$)'''

[[rules]]
name = "gh-release"
command_regex = '''^\s*gh\s+release\s+(create|delete|edit|upload)(\s|$)'''

[[rules]]
name = "gh-repo-mutate"
command_regex = '''^\s*gh\s+repo\s+(create|delete|fork|rename|archive|edit)(\s|$)'''

[[rules]]
name = "gh-api-mutate"
command_regex = '''^\s*gh\s+api\s+.*(-X|--method)\s+(POST|PUT|DELETE|PATCH)'''

# --- Git Force Push ---

[[rules]]
name = "git-push-force"
command_regex = '''^\s*git\s+push\s+.*--force(?!-with-lease)'''

# --- HTTP Mutations ---

[[rules]]
name = "curl-mutate"
command_regex = '''^\s*(curl|wget)\s+.*(-X|--request)\s+(POST|PUT|DELETE|PATCH)'''

[[rules]]
name = "curl-data"
command_regex = '''^\s*curl\s+.*(-d\s|--data\s|--data-raw\s|--data-binary\s|--data-urlencode\s)'''

# --- Google Cloud Mutations ---

[[rules]]
name = "gcloud-mutate"
command_regex = '''^\s*gcloud\s+.*\s+(create|delete|update|set|add|remove|deploy|submit|run|import|export|enable|disable|reset|start|stop|resize|move|restore|cancel|approve|deny|revoke|bind|unbind|attach|detach|push|promote|rollback|abort|suspend|resume)(\s|$)'''

# --- AWS Mutations ---

[[rules]]
name = "aws-mutate"
command_regex = '''^\s*aws\s+(?!\S+\s+(list|describe|get|show|wait)(-\w+)*(\s|$))(?!sts\s+get-caller-identity(\s|$))'''

# --- Firebase Mutations ---

[[rules]]
name = "firebase-mutate"
command_regex = '''^\s*firebase\s+(functions:delete|firestore:delete|hosting:disable|database:(remove|set|update|push))(\s|$)'''

[[rules]]
name = "firebase-auth"
command_regex = '''^\s*firebase\s+auth:(import|export)(\s|$)'''

[[rules]]
name = "firebase-extensions"
command_regex = '''^\s*firebase\s+extensions:(install|uninstall|update|configure)(\s|$)'''

[[rules]]
name = "firebase-project-mutate"
command_regex = '''^\s*firebase\s+(projects:addfirebase|apps:create|use)(\s|$)'''

[[rules]]
name = "firebase-config-mutate"
command_regex = '''^\s*firebase\s+functions:config:(set|unset|clone)(\s|$)'''

[[rules]]
name = "firebase-login"
command_regex = '''^\s*firebase\s+(login|logout)(\s|$)'''

# --- Database Migrations ---

[[rules]]
name = "npm-run-migrate"
command_regex = '''^\s*(npm|yarn|pnpm)\s+run\s+.*migrat(e|ion)'''

# --- macOS Preferences Mutations ---

[[rules]]
name = "defaults-write"
command_regex = '''^\s*defaults\s+(write|import|delete)(\s|$)'''

[[rules]]
name = "plistbuddy-write"
command_regex = '''^\s*/usr/libexec/PlistBuddy\s+-c\s+["']?(Set|Add|Delete|Merge|Import|Copy|Clear)'''

# --- Homebrew Mutations ---

[[rules]]
name = "brew-mutate"
command_regex = '''^\s*brew\s+(install|uninstall|upgrade|reinstall|link|unlink|tap|untap|cleanup|autoremove|pin|unpin|services)(\s|$)'''

# --- Claude CLI Mutations ---

[[rules]]
name = "claude-plugins-mutate"
command_regex = '''^\s*claude\s+plugins?\s+(update|install|uninstall|remove|add)(\s|$)'''

# --- xai CLI Mutations ---

[[rules]]
name = "xai-config-write"
command_regex = '''^\s*xai\s+config\s+(init|set)(\s|$)'''

# --- fam CLI Mutations ---

[[rules]]
name = "fam-init"
command_regex = '''^\s*fam\s+init(\s|$)'''

[[rules]]
name = "fam-fetch-update"
command_regex = '''^\s*fam\s+(fetch|update)(\s|$)'''

[[rules]]
name = "fam-import"
command_regex = '''^\s*fam\s+import(\s|$)'''

[[rules]]
name = "fam-config-set"
command_regex = '''^\s*fam\s+config\s+set(\s|$)'''

[[rules]]
name = "fam-schedule-mutate"
command_regex = '''^\s*fam\s+schedule\s+(enable|disable)(\s|$)'''

[[rules]]
name = "fam-service-mutate"
command_regex = '''^\s*fam\s+service\s+(add|remove)(\s|$)'''

# --- macOS App Manager (duti) ---

[[rules]]
name = "duti-write"
command_regex = '''^\s*duti\s+(-s\s|[^-])'''

# --- claude-sentinel CLI Mutations ---

[[rules]]
name = "claude-sentinel-mutate"
command_regex = '''^\s*claude-sentinel\s+(install|uninstall)(\s|$)'''

# --- Destructive File / Git / Process Operations ---

[[rules]]
name = "rm-recursive"
command_regex = '''^\s*rm\s+.*(-[a-zA-Z]*[rR][a-zA-Z]*\s|--recursive)'''

[[rules]]
name = "git-reset-hard"
command_regex = '''^\s*git\s+(-C\s+\S+\s+)?reset\s+--hard'''

[[rules]]
name = "git-checkout"
command_regex = '''^\s*git\s+(-C\s+\S+\s+)?checkout(\s|$)'''

[[rules]]
name = "git-clean"
command_regex = '''^\s*git\s+(-C\s+\S+\s+)?clean\s+'''

[[rules]]
name = "sed-in-place"
command_regex = '''^\s*sed\s+(-[a-zA-Z]*i|--in-place)'''

[[rules]]
name = "osascript"
command_regex = '''^\s*osascript\s+'''

[[rules]]
name = "bun-x-execute"
command_regex = '''^\s*bun\s+x(\s|$)'''

[[rules]]
name = "pkill-killall"
command_regex = '''^\s*(pkill|killall|kill)\s+'''

[[rules]]
name = "launchctl-mutate"
command_regex = '''^\s*launchctl\s+(load|unload|bootstrap|bootout|kickstart|kill|enable|disable|start|stop|remove|submit)(\s|$)'''

[[rules]]
name = "flashspace-mutate"
command_regex = '''^\s*flashspace\s+(delete|add|set|create|update|remove)[\w-]*(\s|$)'''

[[rules]]
name = "xargs-destructive"
command_regex = '''^\s*xargs\s+(rm|kill|pkill|killall|chmod|chown|mv|dd)'''

# --- Indirect Code Execution ---

# eval / source / `.` execute arbitrary code from a variable or file.
# We can't statically inspect what they'll run, so always confirm.
[[rules]]
name = "eval-source"
command_regex = '''^\s*(eval|source|\.)\s'''
