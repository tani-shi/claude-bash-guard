[[rules]]
name = "rm-rf-root"
command_regex = '''rm\s+(-[a-zA-Z]*r[a-zA-Z]*\s+|--recursive\s+)(/\s*$|/\s+|~\s*$|~\s+|\$HOME\s*$|\$HOME\s+)'''

[[rules]]
name = "sudo"
command_regex = '''^\s*sudo\s+'''

[[rules]]
name = "fork-bomb"
command_regex = ''':\(\)\s*\{'''

[[rules]]
name = "mkfs"
command_regex = '''mkfs(\.\w+)?\s+'''

[[rules]]
name = "dd-zero"
command_regex = '''dd\s+.*if=/dev/(zero|urandom)'''

[[rules]]
name = "pipe-to-shell"
command_regex = '''(curl|wget)\s+.*\|\s*(bash|sh|zsh|dash)'''

[[rules]]
name = "force-push-main"
command_regex = '''git\s+push\s+.*--force(?!-with-lease).*\b(main|master)\b'''

[[rules]]
name = "env-write"
command_regex = '''(>|>>|tee\s+).*\.env(\s|$|\..*$)'''

# --- Read deny rules ---

# A. Environment / config files
[[read_rules]]
name = "env-files"
path_regex = '''(^|/)\.env(\..+)?$'''

[[read_rules]]
name = "envrc"
path_regex = '''(^|/)\.envrc$'''

[[read_rules]]
name = "secrets-files"
path_regex = '''(^|/)secrets\.(yml|yaml|json|toml)$'''

[[read_rules]]
name = "terraform-vars"
path_regex = '''(^|/)terraform\.tfvars(\.json)?$'''

# B. SSH / crypto keys
[[read_rules]]
name = "ssh-dir"
path_regex = '''(^|/)\.ssh/'''

[[read_rules]]
name = "gnupg-dir"
path_regex = '''(^|/)\.gnupg/'''

[[read_rules]]
name = "private-key-files"
path_regex = '''(?<!\bpub)\.(pem|key)$'''

[[read_rules]]
name = "keystore-files"
path_regex = '''\.(p12|pfx|jks|keystore)$'''

# C. Cloud provider credentials
[[read_rules]]
name = "aws-dir"
path_regex = '''(^|/)\.aws/'''

[[read_rules]]
name = "gcloud-dir"
path_regex = '''(^|/)\.config/gcloud/'''

[[read_rules]]
name = "azure-dir"
path_regex = '''(^|/)\.azure/'''

[[read_rules]]
name = "credentials-json"
path_regex = '''(^|/)(credentials|client_secret|service[-_]account[^/]*)\.json$'''

[[read_rules]]
name = "terraform-rc"
path_regex = '''(^|/)\.terraformrc$'''

# D. Container / orchestration
[[read_rules]]
name = "docker-config"
path_regex = '''(^|/)\.docker/config\.json$'''

[[read_rules]]
name = "kube-config"
path_regex = '''(^|/)\.kube/config$'''

# E. Package manager / dev tool auth
[[read_rules]]
name = "netrc"
path_regex = '''(^|/)\.netrc$'''

[[read_rules]]
name = "npmrc"
path_regex = '''(^|/)\.npmrc$'''

[[read_rules]]
name = "pypirc"
path_regex = '''(^|/)\.pypirc$'''

[[read_rules]]
name = "gh-hosts"
path_regex = '''(^|/)\.config/gh/hosts\.yml$'''

[[read_rules]]
name = "maven-settings"
path_regex = '''(^|/)\.m2/settings\.xml$'''

[[read_rules]]
name = "gradle-properties"
path_regex = '''(^|/)\.gradle/gradle\.properties$'''

[[read_rules]]
name = "boto-config"
path_regex = '''(^|/)\.(boto|s3cfg)$'''

# F. Database
[[read_rules]]
name = "pgpass"
path_regex = '''(^|/)\.pgpass$'''

[[read_rules]]
name = "mycnf"
path_regex = '''(^|/)\.my\.cnf$'''

# G. Other
[[read_rules]]
name = "htpasswd"
path_regex = '''(^|/)\.htpasswd$'''

[[read_rules]]
name = "vault-token"
path_regex = '''(^|/)\.vault-token$'''

[[rules]]
name = "gcloud-secrets-access"
command_regex = '''gcloud\s+secrets\s+versions\s+access(\s|$)'''

[[rules]]
name = "gcloud-print-token"
command_regex = '''gcloud\s+auth\s+print-(access|identity)-token(\s|$)'''

[[rules]]
name = "gcloud-service-account-keys"
command_regex = '''gcloud\s+iam\s+service-accounts\s+keys\s+create(\s|$)'''
