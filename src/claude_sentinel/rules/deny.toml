# Denied commands and sensitive paths — confirmation cannot be bypassed.

# --- Command Deny Rules ---

[[rules]]
name = "rm-rf-root"
command_regex = '''rm\s+(-[a-zA-Z]*r[a-zA-Z]*\s+|--recursive\s+)(/\s*$|/\s+|~\s*$|~\s+|\$HOME\s*$|\$HOME\s+)'''

[[rules]]
name = "sudo"
command_regex = '''^\s*sudo\s+'''

[[rules]]
name = "fork-bomb"
command_regex = ''':\(\)\s*\{'''

[[rules]]
name = "mkfs"
command_regex = '''mkfs(\.\w+)?\s+'''

[[rules]]
name = "dd-zero"
command_regex = '''dd\s+.*if=/dev/(zero|urandom)'''

[[rules]]
name = "pipe-to-shell"
command_regex = '''(curl|wget)\s+.*\|\s*(bash|sh|zsh|dash)'''

[[rules]]
name = "force-push-main"
command_regex = '''git\s+push\s+.*--force(?!-with-lease).*\b(main|master)\b'''

[[rules]]
name = "env-write"
command_regex = '''(>|>>)\s*\.env(\s|$|\.)|tee\s+.*\.env(\s|$|\.)'''

[[rules]]
name = "gcloud-secrets-access"
command_regex = '''gcloud\s+secrets\s+versions\s+access(\s|$)'''

[[rules]]
name = "gcloud-print-token"
command_regex = '''gcloud\s+auth\s+print-(access|identity)-token(\s|$)'''

[[rules]]
name = "gcloud-service-account-keys"
command_regex = '''gcloud\s+iam\s+service-accounts\s+keys\s+create(\s|$)'''

# --- Sensitive Path Deny Rules (shared by Read, Write, Edit, MultiEdit) ---

# --- Environment / Config Files ---

[[sensitive_path_rules]]
name = "env-files"
path_regex = '''(^|/)\.env(\..+)?$'''

[[sensitive_path_rules]]
name = "envrc"
path_regex = '''(^|/)\.envrc$'''

[[sensitive_path_rules]]
name = "secrets-files"
path_regex = '''(^|/)secrets\.(yml|yaml|json|toml)$'''

[[sensitive_path_rules]]
name = "terraform-vars"
path_regex = '''(^|/)terraform\.tfvars(\.json)?$'''

# --- SSH / Crypto Keys ---

[[sensitive_path_rules]]
name = "ssh-dir"
path_regex = '''(^|/)\.ssh/'''

[[sensitive_path_rules]]
name = "gnupg-dir"
path_regex = '''(^|/)\.gnupg/'''

[[sensitive_path_rules]]
name = "private-key-files"
path_regex = '''(?<!\bpub)\.(pem|key)$'''

[[sensitive_path_rules]]
name = "keystore-files"
path_regex = '''\.(p12|pfx|jks|keystore)$'''

# --- Cloud Provider Credentials ---

[[sensitive_path_rules]]
name = "aws-dir"
path_regex = '''(^|/)\.aws/'''

[[sensitive_path_rules]]
name = "gcloud-dir"
path_regex = '''(^|/)\.config/gcloud/'''

[[sensitive_path_rules]]
name = "azure-dir"
path_regex = '''(^|/)\.azure/'''

[[sensitive_path_rules]]
name = "credentials-json"
path_regex = '''(^|/)(credentials|client_secret|service[-_]account[^/]*)\.json$'''

[[sensitive_path_rules]]
name = "terraform-rc"
path_regex = '''(^|/)\.terraformrc$'''

# --- Container / Orchestration ---

[[sensitive_path_rules]]
name = "docker-config"
path_regex = '''(^|/)\.docker/config\.json$'''

[[sensitive_path_rules]]
name = "kube-config"
path_regex = '''(^|/)\.kube/config$'''

# --- Package Manager / Dev Tool Auth ---

[[sensitive_path_rules]]
name = "netrc"
path_regex = '''(^|/)\.netrc$'''

[[sensitive_path_rules]]
name = "npmrc"
path_regex = '''(^|/)\.npmrc$'''

[[sensitive_path_rules]]
name = "pypirc"
path_regex = '''(^|/)\.pypirc$'''

[[sensitive_path_rules]]
name = "gh-hosts"
path_regex = '''(^|/)\.config/gh/hosts\.yml$'''

[[sensitive_path_rules]]
name = "maven-settings"
path_regex = '''(^|/)\.m2/settings\.xml$'''

[[sensitive_path_rules]]
name = "gradle-properties"
path_regex = '''(^|/)\.gradle/gradle\.properties$'''

[[sensitive_path_rules]]
name = "boto-config"
path_regex = '''(^|/)\.(boto|s3cfg)$'''

# --- Database ---

[[sensitive_path_rules]]
name = "pgpass"
path_regex = '''(^|/)\.pgpass$'''

[[sensitive_path_rules]]
name = "mycnf"
path_regex = '''(^|/)\.my\.cnf$'''

# --- Other ---

[[sensitive_path_rules]]
name = "htpasswd"
path_regex = '''(^|/)\.htpasswd$'''

[[sensitive_path_rules]]
name = "vault-token"
path_regex = '''(^|/)\.vault-token$'''
