[[rules]]
name = "jq"
command_regex = '''^\s*jq(\s|$)'''

[[rules]]
name = "diff"
command_regex = '''^\s*diff\s+'''

[[rules]]
name = "curl-wget-get"
command_regex = '''^\s*(curl|wget)\s+(?!.*\|\s*(bash|sh|zsh))(?!.*(-X|--request)\s+(POST|PUT|DELETE|PATCH))(?!.*(-d\s|--data))'''

[[rules]]
name = "docker-safe"
command_regex = '''^\s*docker\s+(build|images|ps|logs|inspect|exec|run|stop|start|restart|rm|rmi|pull|tag|network|volume|compose|system|info|version|context|container|image|buildx|manifest|stats|top|port|cp|rename|wait|pause|unpause|attach|diff|history|save|load|export|import|events|login|logout)(\s|$)'''

[[rules]]
name = "test-bracket"
