[[rules]]
name = "jq"
command_regex = '''^\s*jq(\s|$)'''

[[rules]]
name = "diff"
command_regex = '''^\s*diff\s+'''

[[rules]]
name = "curl-wget-simple"
command_regex = '''^\s*(curl|wget)\s+(?!.*\|\s*(bash|sh|zsh))'''

[[rules]]
name = "docker"
command_regex = '''^\s*docker\s+'''

[[rules]]
name = "test-bracket"
command_regex = '''^\s*(\[|test)\s+'''

[[rules]]
name = "cd"
command_regex = '''^\s*cd(\s|$)'''

[[rules]]
name = "rm-safe"
command_regex = '''^\s*(rm|trash)\s+'''

[[rules]]
name = "chmod-chown"
