[[rules]]
name = "tar-zip"
command_regex = '''^\s*(tar|zip|unzip|gzip|gunzip)\s+'''

[[rules]]
name = "env-printenv"
command_regex = '''^\s*(env|printenv|export)\s*'''

[[rules]]
name = "linters"
command_regex = '''^\s*(tsc|eslint|prettier|biome|shellcheck|mypy|pyright|ruff|shfmt)(\s|$)'''

[[rules]]
name = "help-flag"
command_regex = '''\s--help(\s|$)'''

[[rules]]
name = "help-subcommand"
command_regex = '''^\s*\S+\s+help(\s|$)'''

[[rules]]
name = "gh-read"
command_regex = '''^\s*gh\s+(status|api|search)(\s|$)'''

[[rules]]
name = "gh-subcommand-read"
command_regex = '''^\s*gh\s+\S+\s+(list|view|get|status|diff|check|watch|search|verify|logs|ports|token|trusted-root|gitignore|license|field-list|item-list)(\s|$)'''

[[rules]]
name = "gog-read"
command_regex = '''^\s*gog\s+(version|people|groups)(\s|$)'''

[[rules]]
name = "gog-subcommand-read"
command_regex = '''^\s*gog\s+\S+\s+(get|list|list-\w+|search|status|find|export|info|cat|ls|url|download|metadata|notes|content|responses|attachment|history|permissions|keys|path|drives|directory|other|acl|calendars|colors|conflicts|events?|freebusy|team|time|users|services|roster|profile)(\s|$)'''

[[rules]]
name = "gog-deep-read"
command_regex = '''^\s*gog\s+\S+\s+\S+\s+(get|list|search|status|find|space|opens|url|profile|roster)(\s|$)'''

[[rules]]
name = "pdftotext"
command_regex = '''^\s*pdftotext(\s|$)'''

[[rules]]
name = "fam-read"
command_regex = '''^\s*fam\s+(show|export)(\s|$)'''

[[rules]]
name = "fam-subcommand-read"
command_regex = '''^\s*fam\s+\S+\s+(show|status|list|test)(\s|$)'''

[[rules]]
name = "gcloud-info"
command_regex = '''^\s*gcloud\s+(version|info|help|cheat-sheet|feedback|survey)(\s|$)'''

[[rules]]
name = "gcloud-read"
command_regex = '''^\s*gcloud\s+.*\s+(list|describe|get-iam-policy|search|lookup|diagnose|metrics|wait|validate|notices)(\s|$)'''

[[rules]]
name = "gcloud-read-compound"
command_regex = '''^\s*gcloud\s+.*\s+(list-\w+|describe-\w+|fetch-\w+|query-\w+|check-\w+|show-\w+|pre-check-\w+|install-status|is-upgradeable)(\s|$)'''

[[rules]]
name = "gcloud-get-safe"
command_regex = '''^\s*gcloud\s+.*\s+get-(?!credentials)([\w-]+)(\s|$)'''

[[rules]]
name = "gcloud-config-read"
command_regex = '''^\s*gcloud\s+(config\s+(list|get|configurations\s+(list|describe))|auth\s+list)(\s|$)'''

[[rules]]
name = "gcloud-detect-analyze"
command_regex = '''^\s*gcloud\s+.*\s+(detect-\w+|analyze-\w+|classify-text|recognize|recognize-long-running|explain|predict|raw-predict|direct-predict|direct-raw-predict)(\s|$)'''
