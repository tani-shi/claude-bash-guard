command_regex = '''^\s*git\s+(add|commit|checkout|switch|stash|pull|fetch|rebase|merge|cherry-pick)(\s|$)'''

[[rules]]
name = "git-push-safe"
command_regex = '''^\s*git\s+push(\s+--force-with-lease|\s+origin|\s+-u|\s+--set-upstream|\s*$)'''

[[rules]]
name = "which-type"
command_regex = '''^\s*(which|type|command\s+-v)\s+'''

[[rules]]
name = "date-uname"
command_regex = '''^\s*(date|uname|whoami|hostname|id)\s*'''

[[rules]]
name = "python-uv"
