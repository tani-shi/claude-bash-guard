# Allow-listed commands and patterns that pass without confirmation.

# --- Shell Builtins & Navigation ---

[[rules]]
name = "comment"
command_regex = '''^\s*#'''

[[rules]]
name = "ls"
command_regex = '''^\s*ls(\s|$)'''

[[rules]]
name = "cat"
command_regex = '''^\s*cat\s+'''

[[rules]]
name = "echo"
command_regex = '''^\s*echo\s+'''

[[rules]]
name = "pwd"
command_regex = '''^\s*pwd\s*$'''

[[rules]]
name = "head-tail"
command_regex = '''^\s*(head|tail)\s+'''

[[rules]]
name = "wc"
command_regex = '''^\s*wc(\s|$)'''

[[rules]]
name = "find"
command_regex = '''^\s*find\s+'''

[[rules]]
name = "grep"
command_regex = '''^\s*(grep|rg|ag)\s+'''

[[rules]]
name = "shell-constructs"
command_regex = '''^\s*(for|while|if|case|do|done|then|else|elif|fi|esac)(\s|$)'''

[[rules]]
name = "pushd-popd"
command_regex = '''^\s*(pushd|popd)(\s|$)'''

[[rules]]
name = "which-type"
command_regex = '''^\s*(which|type|command\s+-v)\s+'''

[[rules]]
name = "date-uname"
command_regex = '''^\s*(date|uname|whoami|hostname|id)\s*'''

[[rules]]
name = "cd"
command_regex = '''^\s*cd(\s|$)'''

# --- Variable Assignment ---
# Static assignments only. Quoted values must not contain command substitution
# ($(), `...`, ${...}); unquoted values are restricted to safe word characters.
# Anything containing $() / `` is split out as a separate segment by the splitter
# and evaluated independently, so a malicious VAR=$(curl evil) cannot bypass
# this rule.

[[rules]]
name = "variable-assignment"
command_regex = '''^\s*[A-Za-z_][A-Za-z0-9_]*=('[^']*'|"[^"`$]*"|[\w./:@%+-]*)\s*$'''

[[rules]]
name = "test-bracket"
command_regex = '''^\s*(\[|test)\s+'''

[[rules]]
name = "env-printenv"
command_regex = '''^\s*(env|printenv)\s*'''

[[rules]]
name = "sleep"
command_regex = '''^\s*sleep\s+'''

# --- File Operations ---

[[rules]]
