command_regex = '''^\s*(trash\s+|rm\s+(?!.*(-[a-zA-Z]*[rR]|--recursive)))'''

[[rules]]
name = "chmod-chown"
command_regex = '''^\s*(chmod|chown)\s+'''

[[rules]]
name = "tar-zip"
command_regex = '''^\s*(tar|zip|unzip|gzip|gunzip)\s+'''

[[rules]]
name = "file-cmd"
command_regex = '''^\s*file\s+'''

[[rules]]
name = "strings"
command_regex = '''^\s*strings\s+'''

[[rules]]
name = "uuidgen"
command_regex = '''^\s*uuidgen\s*'''

[[rules]]
name = "diff"
command_regex = '''^\s*diff\s+'''

# --- Text Processing ---

[[rules]]
name = "sed-awk"
command_regex = '''^\s*(sed|awk)\s+'''

[[rules]]
name = "sort-uniq-cut"
command_regex = '''^\s*(sort|uniq|cut|tr|tee|xargs)\s*'''

