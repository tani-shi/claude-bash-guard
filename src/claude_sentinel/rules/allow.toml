[[rules]]
name = "ls"
command_regex = '''^\s*ls(\s|$)'''

[[rules]]
name = "cat"
command_regex = '''^\s*cat\s+'''

[[rules]]
name = "echo"
command_regex = '''^\s*echo\s+'''

[[rules]]
name = "pwd"
command_regex = '''^\s*pwd\s*$'''

[[rules]]
name = "head-tail"
command_regex = '''^\s*(head|tail)\s+'''

[[rules]]
name = "wc"
command_regex = '''^\s*wc(\s|$)'''

[[rules]]
name = "find"
command_regex = '''^\s*find\s+'''

[[rules]]
name = "grep"
command_regex = '''^\s*(grep|rg|ag)\s+'''

[[rules]]
name = "git-status"
command_regex = '''^\s*git\s+(status|log|diff|branch|show|rev-parse|remote)(\s|$)'''

[[rules]]
name = "git-add-commit"
command_regex = '''^\s*git\s+(add|commit|checkout|switch|stash|pull|fetch|rebase|merge|cherry-pick|reset)(\s|$)'''

[[rules]]
name = "git-push-safe"
command_regex = '''^\s*git\s+push(\s+--force-with-lease|\s+origin|\s+-u|\s+--set-upstream|\s*$)'''

[[rules]]
name = "which-type"
command_regex = '''^\s*(which|type|command\s+-v)\s+'''

