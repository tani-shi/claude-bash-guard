[[rules]]
name = "cd"
command_regex = '''^\s*cd(\s|$)'''

[[rules]]
name = "rm-safe"
command_regex = '''^\s*(rm|trash)\s+'''

[[rules]]
name = "chmod-chown"
command_regex = '''^\s*(chmod|chown)\s+'''

[[rules]]
name = "tar-zip"
command_regex = '''^\s*(tar|zip|unzip|gzip|gunzip)\s+'''

[[rules]]
name = "env-printenv"
command_regex = '''^\s*(env|printenv|export)\s*'''

[[rules]]
name = "linters"
