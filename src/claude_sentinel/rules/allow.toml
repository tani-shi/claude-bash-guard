[[rules]]
name = "npm-node"
command_regex = '''^\s*(node|npm|npx|yarn|pnpm|pnpx|bun)\s+'''

[[rules]]
name = "cargo-rustc"
command_regex = '''^\s*(cargo|rustc|rustup)\s+'''

[[rules]]
name = "go"
command_regex = '''^\s*go\s+(build|run|test|mod|fmt|vet|generate)(\s|$)'''

[[rules]]
name = "make"
command_regex = '''^\s*make(\s|$)'''

[[rules]]
name = "mkdir"
command_regex = '''^\s*mkdir\s+'''

[[rules]]
name = "touch"
command_regex = '''^\s*touch\s+'''

[[rules]]
name = "cp-mv"
command_regex = '''^\s*(cp|mv)\s+'''

[[rules]]
name = "sed-awk"
command_regex = '''^\s*(sed|awk)\s+'''

[[rules]]
name = "sort-uniq-cut"
