command_regex = '''^\s*gog\s+\S+\s+\S+\s+(get|list|search|status|find|space|opens|url|profile|roster)(\s|$)'''

[[rules]]
name = "pdftotext"
command_regex = '''^\s*pdftotext(\s|$)'''

[[rules]]
name = "fam-read"
command_regex = '''^\s*fam\s+(show|export)(\s|$)'''

[[rules]]
name = "fam-subcommand-read"
command_regex = '''^\s*fam\s+\S+\s+(show|status|list|test)(\s|$)'''

[[rules]]
name = "gcloud-info"
command_regex = '''^\s*gcloud\s+(version|info|help|cheat-sheet|feedback|survey)(\s|$)'''

[[rules]]
name = "gcloud-read"
command_regex = '''^\s*gcloud\s+.*\s+(list|describe|get-iam-policy|search|lookup|diagnose|metrics|wait|validate|notices)(\s|$)'''

[[rules]]
name = "gcloud-read-compound"
command_regex = '''^\s*gcloud\s+.*\s+(list-\w+|describe-\w+|fetch-\w+|query-\w+|check-\w+|show-\w+|pre-check-\w+|install-status|is-upgradeable)(\s|$)'''

[[rules]]
name = "gcloud-get-safe"
command_regex = '''^\s*gcloud\s+.*\s+get-(?!credentials)([\w-]+)(\s|$)'''

[[rules]]
name = "gcloud-config-read"
command_regex = '''^\s*gcloud\s+(config\s+(list|get|configurations\s+(list|describe))|auth\s+list)(\s|$)'''

[[rules]]
name = "gcloud-detect-analyze"
command_regex = '''^\s*gcloud\s+.*\s+(detect-\w+|analyze-\w+|classify-text|recognize|recognize-long-running|explain|predict|raw-predict|direct-predict|direct-raw-predict)(\s|$)'''

[[rules]]
name = "firebase-read"
command_regex = '''^\s*firebase\s+(emulators:(start|exec)|serve|init|functions:log|firestore:indexes|projects:list|apps:list|functions:config:get|login:list|setup:emulators:\w+|target|target:apply|target:clear|target:remove)(\s|$)'''

[[rules]]
name = "aws-read"
command_regex = '''^\s*aws\s+\S+\s+(list|describe|get|show|wait)(-\w+)*(\s|$)'''

[[rules]]
name = "aws-sts-read"
command_regex = '''^\s*aws\s+sts\s+get-caller-identity(\s|$)'''

