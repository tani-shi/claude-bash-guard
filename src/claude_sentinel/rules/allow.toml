name = "npm-run-safe"
command_regex = '''^\s*(npm|yarn|pnpm)\s+run\s+(?!deploy|publish|release|push)'''

[[rules]]
name = "rustc-rustup"
command_regex = '''^\s*(rustc|rustup)\s+'''

[[rules]]
name = "cargo-safe"
command_regex = '''^\s*cargo\s+(build|check|test|run|bench|clean|doc|new|init|add|remove|update|search|install|uninstall|fmt|clippy|fix|tree|metadata|verify-project|generate-lockfile|fetch|package|vendor|report|help|version)(\s|$)'''

[[rules]]
name = "go"
command_regex = '''^\s*go\s+(build|run|test|mod|fmt|vet|generate)(\s|$)'''

[[rules]]
name = "make-safe"
command_regex = '''^\s*make(\s*$|\s+(?!deploy|publish|release|push\b|tf[\w-]*\b|terraform-[\w-]*\b))'''

[[rules]]
name = "mkdir"
command_regex = '''^\s*mkdir\s+'''

[[rules]]
name = "touch"
command_regex = '''^\s*touch\s+'''

[[rules]]
name = "cp-mv"
command_regex = '''^\s*(cp|mv)\s+'''

[[rules]]
name = "sed-awk"
command_regex = '''^\s*(sed|awk)\s+'''

[[rules]]
name = "sort-uniq-cut"
