name = "gog-read"
command_regex = '''^\s*gog\s+(version|people|groups)(\s|$)'''

[[rules]]
name = "gog-subcommand-read"
command_regex = '''^\s*gog\s+\S+\s+(get|list|list-\w+|search|status|find|export|info|cat|ls|url|download|metadata|notes|content|responses|attachment|history|permissions|keys|path|drives|directory|other|acl|calendars|colors|conflicts|events?|freebusy|team|time|users|services|roster|profile)(\s|$)'''

[[rules]]
