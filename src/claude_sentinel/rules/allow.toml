[[rules]]
name = "help-flag"
command_regex = '''\s--help(\s|$)'''

[[rules]]
name = "help-subcommand"
command_regex = '''^\s*\S+\s+help(\s|$)'''

# --- Git ---

[[rules]]
name = "git-status"
command_regex = '''^\s*git\s+(-C\s+\S+\s+)?(status|log|diff|branch|show|rev-parse|remote)(\s|$)'''

[[rules]]
name = "git-add-commit"
command_regex = '''^\s*git\s+(-C\s+\S+\s+)?(add|commit|switch|stash|pull|fetch|rebase|merge|cherry-pick|reset|restore|revert)(\s|$)'''

[[rules]]
name = "git-push-safe"
command_regex = '''^\s*git\s+(-C\s+\S+\s+)?push(\s+--force-with-lease|\s+origin|\s+-u|\s+--set-upstream|\s*$)'''

[[rules]]
name = "git-read-extra"
command_regex = '''^\s*git\s+(-C\s+\S+\s+)?(submodule|ls-files|ls-tree|ls-remote|describe|name-rev|shortlog|blame|grep|tag|reflog|config\s+(--get|--list|list))(\s|$)'''

[[rules]]
name = "git-version"
command_regex = '''^\s*git\s+--version\s*$'''

# --- Python ---

[[rules]]
name = "python-run"
command_regex = '''^\s*python3?\s+'''

[[rules]]
name = "uv-safe"
command_regex = '''^\s*uv\s+(run|sync|lock|tree|pip\s+(list|show|check|freeze)|tool\s+run|version|self\s+version|venv|init|build|export)(\s|$)'''

[[rules]]
name = "pip-read"
command_regex = '''^\s*pip3?\s+(show|list|freeze|check|search|config\s+(list|get))(\s|$)'''

# --- Node.js ---

[[rules]]
name = "node-run"
command_regex = '''^\s*node\s+'''

[[rules]]
name = "bun-safe"
command_regex = '''^\s*bun\s+(run|test|build|install|add|remove|update|init|create|pm)(\s|$)'''

[[rules]]
name = "npm-safe"
command_regex = '''^\s*(npm|yarn|pnpm)\s+(install|ci|test|start|build|clean|lint|format|check|outdated|list|ls|info|view|show|explain|why|audit|fund|pack|init|create|exec|config|cache|doctor|prefix|root|search|completion|help|set|get|version)(\s|$)'''

[[rules]]
name = "npx-safe"
command_regex = '''^\s*(npx|pnpx|bunx)\s+(prettier|eslint|tsc|biome|shadcn(@\S+)?|prisma|vitest|jest|mocha|playwright|cypress|tailwindcss|postcss|autoprefixer|next|vite|turbo|tsup|esbuild|rollup|webpack)(\s|$)'''

[[rules]]
name = "npm-run-safe"
command_regex = '''^\s*(npm|yarn|pnpm)\s+run\s+(test|lint|build|dev|start|check|format|clean|docs|typecheck|type-check|analyze|watch|serve|preview|generate|codegen|prepare|preinstall|postinstall|prebuild|postbuild|cli)(\s|$)'''

# --- Rust ---

[[rules]]
name = "rustc"
command_regex = '''^\s*rustc\s+'''

[[rules]]
name = "rustup-read"
command_regex = '''^\s*rustup\s+(show|which|doc|completions|check|--version)(\s|$)'''

[[rules]]
name = "cargo-safe"
command_regex = '''^\s*cargo\s+(build|check|test|run|bench|clean|doc|new|init|fmt|clippy|fix|tree|metadata|verify-project|generate-lockfile|fetch|package|vendor|report|help|version)(\s|$)'''

# --- Go ---

[[rules]]
name = "go"
command_regex = '''^\s*go\s+(build|run|test|mod|fmt|vet)(\s|$)'''

# --- Make ---
# Trust the project's Makefile the same way we trust cargo/npm/uv/go: any
# target may run arbitrary code, so listing specific targets gave a false
# sense of safety while breaking project-specific targets like
# `make door-ne-download`.

[[rules]]
name = "make"
command_regex = '''^\s*make(\s|$)'''

# --- Linters & Formatters ---

[[rules]]
name = "linters"
command_regex = '''^\s*(tsc|eslint|prettier|biome|shellcheck|mypy|pyright|ruff|shfmt)(\s|$)'''

# --- HTTP & Network ---

[[rules]]
name = "curl-wget-get"
command_regex = '''^\s*(curl|wget)\s+(?!.*\|\s*(bash|sh|zsh))(?!.*(-X|--request)\s+(POST|PUT|DELETE|PATCH))(?!.*(-d\s|--data|--form|-F\s|--upload-file|-T\s))'''

# --- Docker ---

[[rules]]
